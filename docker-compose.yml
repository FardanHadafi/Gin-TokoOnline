services:
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - toko-network

  app:
    build: .
    container_name: toko_backend
    environment:
      # These will be populated from .env file on the HOST machine
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_NAME=${ADMIN_NAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_WHATSAPP=${ADMIN_WHATSAPP}
      - CLOUDINARY_URL=${CLOUDINARY_URL}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - PUBLIC_URL=${PUBLIC_URL}
    depends_on:
      - redis
    networks:
      - toko-network

  redis:
    image: redis:7-alpine
    container_name: toko_redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - toko-network

  # Ngrok tunnel — exposes local backend to the internet
  # This allows Midtrans webhook to reach localhost
  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok_tunnel
    restart: unless-stopped
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http nginx:80 --log stdout
    ports:
      - "4040:4040" # Ngrok web inspector (view public URL here)
    depends_on:
      - nginx
    networks:
      - toko-network

networks:
  toko-network:
    driver: bridge

volumes:
  redis_data:
